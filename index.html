<!doctype html>
<html lang="kk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartCriteria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100%}
#root{min-height:100vh}
:root{
  --font-sans:'Geist','Inter',system-ui,sans-serif;
  --font-display:'Fraunces','Georgia',serif;
  --font-mono:'JetBrains Mono',monospace;
}
.dir-c{
  --bg:#0f1115;--surface:#181b22;--surface-2:#1f232c;
  --ink:#f5f4ef;--ink-2:#c9c8c2;--ink-3:#8a8983;
  --line:#2a2f38;--line-2:#353b46;
  --accent:#d4ff3b;--accent-2:#6a8cff;
  --success:#6dd49b;--danger:#ff6b6b;--warn:#ffd166;
  --radius:8px;--radius-sm:4px;--radius-lg:12px;
}
body{font-family:var(--font-sans);background:var(--bg);color:var(--ink)}
a{color:inherit;text-decoration:none}
button{font-family:var(--font-sans);cursor:pointer}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}

/* shared util classes */
.sc-mono{font-family:var(--font-mono)}
.sc-display{font-family:var(--font-display);font-weight:400;letter-spacing:-0.02em}

/* progress bar */
.sc-bar{height:4px;background:var(--surface-2);border-radius:999px;overflow:hidden}
.sc-bar>i{display:block;height:100%;background:var(--accent);border-radius:999px}

/* checkmark circle */
.sc-check{width:18px;height:18px;border-radius:999px;border:1.5px solid var(--line-2);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.sc-check.done{background:var(--success);border-color:var(--success);color:#fff}

/* card */
.sc-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}

/* phone */
.phone-screen{width:390px;height:844px;overflow:hidden;background:var(--bg);color:var(--ink);position:relative;font-family:var(--font-sans)}
.phone-status{height:44px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:600}
.phone-home{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:var(--ink);border-radius:999px;opacity:0.3}

/* leaf */
.sc-leaf{width:14px;height:14px;border-radius:999px;background:var(--success);display:inline-block}
.sc-leaf.empty{background:transparent;border:1.5px dashed var(--line-2)}
.sc-leaf.partial{background:var(--warn)}

/* page transitions */
.page-fade{animation:pfade .2s ease both}
@keyframes pfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* mockup float */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.mockup-float{animation:float 5s ease-in-out infinite}

/* stat pulse dot */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.stat-dot{animation:pulse 2s ease-in-out infinite}

/* phone frame */
.phone-frame{border-radius:44px;overflow:hidden;box-shadow:0 0 0 10px var(--surface),0 0 0 11px var(--line-2),0 32px 80px rgba(0,0,0,.55);flex-shrink:0}
@media(max-width:430px){
  .phone-frame{box-shadow:none!important;border-radius:0!important}
  .phone-frame .phone-screen{width:100vw!important;height:100dvh!important}
  .back-btn{display:none!important}
}

/* teacher layout */
.teacher-root{width:100vw;height:100vh;overflow:hidden;display:grid;grid-template-columns:220px 1fr;font-family:var(--font-sans)}
.teacher-sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:14px 0;overflow-y:auto}
.teacher-main{overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}
.teacher-content{flex:1;overflow:auto;padding:28px 32px}

/* nav item */
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--ink-2);transition:background .12s,color .12s;margin:0 6px}
.nav-item:hover{background:var(--surface-2);color:var(--ink)}
.nav-item.active{background:var(--surface-2);color:var(--ink);font-weight:500}

/* table row hover */
.trow{display:grid;padding:13px 16px;font-size:13px;align-items:center;border-bottom:1px solid var(--line);transition:background .1s;cursor:default}
.trow:hover{background:var(--surface-2)}

/* grid bg */
.sc-grid-bg{background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:32px 32px;opacity:.3}

/* chip */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;font-size:11px;border:1px solid var(--line);border-radius:999px;color:var(--ink-2)}

/* btn base */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 16px;font-size:13px;font-weight:500;border-radius:var(--radius);border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer;transition:opacity .12s,border-color .12s,background .12s}
.btn:hover{opacity:.85}
.btn-solid{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.btn-accent{background:var(--accent);color:#0f1115;border-color:var(--accent)}

/* input */
.sc-input{width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink);border-radius:var(--radius);font-family:var(--font-sans);outline:none}
.sc-input:focus{border-color:var(--accent)}
</style>
</head>
<body class="dir-c">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="babel.min.js"></script>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useCallback, useRef } = React;

const STORAGE_KEYS = {
  account: 'smartcriteria.account',
  criteriaDraft: 'smartcriteria.criteriaDraft',
  assignedTask: 'smartcriteria.assignedTask',
  studentTask: 'smartcriteria.studentTask',
  studentProgress: 'smartcriteria.studentProgress',
  studentFeedback: 'smartcriteria.studentFeedback',
  teacherChats: 'smartcriteria.teacherChats',
};

const DEFAULT_PROBLEM = 'Машина 5 секундта 0-ден 20 м/с-ке дейін біркелкі үдейді. Машинаның массасы 1200 кг. Машинаны үдететін күш қандай?';

const readStorage = (key, fallback = null) => {
  try {
    const raw = window.localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
};

const writeStorage = (key, value) => {
  try {
    window.localStorage.setItem(key, JSON.stringify(value));
  } catch {}
};

const persistServerState = async (key, value) => {
  try {
    await fetch('/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value }),
    });
  } catch {}
};

const syncStateFromServer = async () => {
  try {
    const res = await fetch('/api/state');
    const data = await res.json();
    Object.entries(data || {}).forEach(([key, value]) => {
      if (value !== undefined) writeStorage(key, value);
    });
  } catch {}
};

const copyText = async (text) => {
  if (!text) return false;
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch {
    return false;
  }
};

const downloadTextFile = (filename, text) => {
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
};

const downloadCsvFile = (filename, rows) => {
  const csv = rows
    .map(row => row.map(cell => `"${String(cell ?? '').replace(/"/g, '""')}"`).join(','))
    .join('\n');
  const blob = new Blob([`\ufeff${csv}`], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
};

const downloadHtmlFile = (filename, html) => {
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
};

const formatCriteriaText = ({ problem, criteria, meta = {} }) => {
  const lines = [
    'SmartCriteria',
    '',
    `Пән: ${meta.subject || '-'}`,
    `Сынып: ${meta.grade || '-'}`,
    `Блум: ${meta.bloomLevel || '-'}`,
    `Бағалау: ${meta.evalType || '-'}`,
    '',
    'Есеп:',
    problem || '',
    '',
    'Критерийлер:',
  ];
  (criteria || []).forEach((item, index) => {
    lines.push(`${index + 1}. ${item.title} — ${item.desc} (${item.pts}б)`);
  });
  return lines.join('\n');
};

const buildDemoCriteria = (count = 4) => {
  const seed = [
    { title: 'Берілген шамаларды анықтайды', desc: 'Есептен m, v0, v және t мәндерін дұрыс жазады.', pts: 1 },
    { title: 'Үдеуді есептейді', desc: 'a=(v-v0)/t формуласын қолданып, үдеуді табады.', pts: 1 },
    { title: 'Ньютонның 2-заңын қолданады', desc: 'F=ma формуласын дұрыс таңдап, есептеуге енгізеді.', pts: 1 },
    { title: 'Жауапты рәсімдейді', desc: 'Жауаптың өлшем бірлігін көрсетіп, қорытынды жазады.', pts: 1 },
    { title: 'Шешімді түсіндіреді', desc: 'Қадамдардың логикасын қысқаша түсіндіреді.', pts: 1 },
    { title: 'Нәтижені тексереді', desc: 'Алынған мәннің мағынасы мен таңбасын тексереді.', pts: 1 },
  ];
  return seed.slice(0, count);
};

const isMotionForceProblem = (text = '') => {
  const normalized = String(text).toLowerCase();
  return normalized.includes('машина') && normalized.includes('м/с') && normalized.includes('кг');
};

const buildMotionCriteria = () => ([
  { title: 'Берілген шамаларды анықтайды', desc: 'm, v0, v және t мәндерін дұрыс жазады.', pts: 1 },
  { title: 'Үдеуді есептейді', desc: 'a=(v-v0)/t формуласын қолданып, үдеуді табады.', pts: 1 },
  { title: 'Күшті табады', desc: 'F=ma формуласын қолданып, күш мәнін есептейді.', pts: 2 },
  { title: 'Жауапты рәсімдейді', desc: 'Жауапты Н бірлігімен жазып, қорытындылайды.', pts: 2 },
]);

const CLASS_STUDENTS = [
  { name:'Айдана Мұқашева', avg:87, weak:'Алгебра', streak:12, f:[2,1,4,0] },
  { name:'Дамир Серіков', avg:74, weak:'Физика', streak:5, f:[1,3,2,6] },
  { name:'Аяулым Қасым', avg:92, weak:'—', streak:24, f:[0,1,1,0] },
  { name:'Нұрбек Ахметов', avg:68, weak:'Геометрия', streak:0, f:[4,2,5,3] },
  { name:'Әсем Бекенова', avg:81, weak:'Алгебра', streak:8, f:[2,2,3,1] },
  { name:'Қанат Жұманов', avg:79, weak:'Физика', streak:14, f:[1,4,2,2] },
  { name:'Мадина Сейтбек', avg:95, weak:'—', streak:31, f:[0,0,1,1] },
  { name:'Тимур Оразов', avg:71, weak:'Алгебра', streak:3, f:[3,2,3,4] },
];

const buildSubjectCriteria = ({ subject, problem, descCount, bloomLevel }) => {
  if (subject === 'Физика' && isMotionForceProblem(problem)) return buildMotionCriteria().slice(0, descCount);

  const banks = {
    'Алгебра': [
      { title:'Берілген өрнектерді анықтайды', desc:'Теңдеу не өрнектегі берілгендерді дұрыс жазады.', pts:1 },
      { title:'Әдісті таңдайды', desc:'Тиісті формула не түрлендіру әдісін қолданады.', pts:1 },
      { title:'Түрлендіру жүргізеді', desc:'Алгебралық қадамдарды ретімен орындайды.', pts:2 },
      { title:'Шешімді тексереді', desc:'Табылған жауаптың дұрыстығын тексеріп жазады.', pts:2 },
    ],
    'Геометрия': [
      { title:'Фигура элементтерін анықтайды', desc:'Берілген кесінді, бұрыш және шарттарды ажыратады.', pts:1 },
      { title:'Теореманы таңдайды', desc:'Қажетті геометриялық теореманы орынды қолданады.', pts:1 },
      { title:'Есептеуді орындайды', desc:'Формула не дәлелдеуді қадамдап жүргізеді.', pts:2 },
      { title:'Қорытынды жасайды', desc:'Нәтижені белгілеумен бірге дұрыс жазады.', pts:2 },
    ],
    'Химия': [
      { title:'Заттарды анықтайды', desc:'Берілген реагенттер мен шамаларды дұрыс жазады.', pts:1 },
      { title:'Реакцияны құрастырады', desc:'Тиісті теңдеу не формуланы дұрыс таңдайды.', pts:1 },
      { title:'Есептеу жүргізеді', desc:'Моль, масса не концентрация бойынша есептейді.', pts:2 },
      { title:'Нәтижені түсіндіреді', desc:'Жауапты химиялық тілмен және бірлікпен жазады.', pts:2 },
    ],
    'Биология': [
      { title:'Негізгі ұғымдарды ажыратады', desc:'Нысан мен биологиялық үдерісті дұрыс анықтайды.', pts:1 },
      { title:'Байланысты түсіндіреді', desc:'Себеп-салдар не қызметтік байланысты көрсетеді.', pts:1 },
      { title:'Талдау жасайды', desc:'Берілген дерекке сүйеніп қорытынды шығарады.', pts:2 },
      { title:'Жауапты негіздейді', desc:'Терминдерді қолданып нақты тұжырым жазады.', pts:2 },
    ],
  };

  const base = banks[subject] || buildDemoCriteria(descCount);
  if (bloomLevel === 'Талдау' || bloomLevel === 'Бағалау') {
    return base.map((item, index) => (
      index === base.length - 1
        ? { ...item, desc: `${item.desc.replace(/\.$/, '')} және қорытындысын негіздейді.` }
        : item
    )).slice(0, descCount);
  }
  return base.slice(0, descCount);
};

const buildTeacherNotifications = () => {
  const assignedTask = readStorage(STORAGE_KEYS.assignedTask, null);
  const draft = readStorage(STORAGE_KEYS.criteriaDraft, null);
  const chats = readStorage(STORAGE_KEYS.teacherChats, {});
  const unreadChatCount = Object.values(chats).reduce((sum, list) => sum + Math.max(0, (list || []).filter(msg => msg.from === 'student').length - 1), 0);
  const notices = [];
  if (assignedTask) {
    notices.push(`Тапсырма белсенді: ${assignedTask.code} · ${assignedTask.subject}`);
  }
  if (draft?.problem) {
    notices.push(`Сақталған черновик бар: ${draft.subject || 'Пән'} · ${draft.grade || '-'}`);
  }
  notices.push(`Оқушылар чаты: ${unreadChatCount || 4} хабарлама`);
  notices.push('Экспорт Excel-ready CSV форматында қолжетімді');
  return notices;
};

const buildAnalyticsData = () => {
  const assignedTask = readStorage(STORAGE_KEYS.assignedTask, null);
  const students = CLASS_STUDENTS;
  const avg = Math.round(students.reduce((sum, s) => sum + s.avg, 0) / students.length);
  const activeStudents = students.filter(s => s.streak > 0).length;
  const weakCounts = students.reduce((acc, student) => {
    if (student.weak && student.weak !== '—') acc[student.weak] = (acc[student.weak] || 0) + 1;
    return acc;
  }, {});
  const topWeak = Object.entries(weakCounts).sort((a, b) => b[1] - a[1])[0] || ['—', 0];
  const criteriaMap = [
    ['К1', Math.round(students.reduce((sum, s) => sum + s.f[0], 0) / students.length)],
    ['К2', Math.round(students.reduce((sum, s) => sum + s.f[1], 0) / students.length)],
    ['К3', Math.round(students.reduce((sum, s) => sum + s.f[2], 0) / students.length)],
    ['К4', Math.round(students.reduce((sum, s) => sum + s.f[3], 0) / students.length)],
  ];
  return {
    assignedTask,
    students,
    avg,
    activeStudents,
    totalTasks: assignedTask ? students.length : 14,
    weakTopic: topWeak[0],
    weakCount: topWeak[1],
    criteriaMap,
    subjects: [
      ['Алгебра', 'var(--accent)', 80],
      ['Физика', 'var(--accent-2)', assignedTask?.subject === 'Физика' ? avg : 74],
      ['Геометрия', 'var(--success)', 86],
    ],
    weekData: [avg - 8, avg - 3, avg - 6, avg + 4, avg],
  };
};

const buildAssignedTask = ({
  problem,
  subject,
  grade,
  difficulty,
  evalType,
  bloomLevel,
  criteria,
  code,
  title,
}) => ({
  code: code || `AI-${String(Date.now()).slice(-6)}`,
  title: title || (problem || DEFAULT_PROBLEM).slice(0, 52),
  problem: problem || DEFAULT_PROBLEM,
  subject: subject || 'Физика',
  grade: String(grade || '9').replace('-сынып', ''),
  difficulty: difficulty || 'Орта',
  evalType: evalType || 'Қалыптастырушы',
  bloomLevel: bloomLevel || 'Қолдану',
  criteria: Array.isArray(criteria) && criteria.length ? criteria : buildDemoCriteria(4),
  assignedAt: new Date().toISOString(),
});

const DEFAULT_STUDENT_PROGRESS = {
  xp: 2140,
  level: 7,
  levelTitle: 'Зерттеуші',
  streak: 7,
  solvedTasks: 12,
  achievements: ['7 күн', 'Үздік', 'Жылдам', 'Алгебра', 'Геометр'],
  branches: {
    'Алгебра': { total: 12, done: 9 },
    'Геометрия': { total: 10, done: 6 },
    'Физика': { total: 14, done: 10 },
    'Химия': { total: 8, done: 4 },
    'Биология': { total: 8, done: 3 },
  },
  solvedCodes: [],
};

const readStudentProgress = () => ({
  ...DEFAULT_STUDENT_PROGRESS,
  ...(readStorage(STORAGE_KEYS.studentProgress, {}) || {}),
  branches: {
    ...DEFAULT_STUDENT_PROGRESS.branches,
    ...((readStorage(STORAGE_KEYS.studentProgress, {}) || {}).branches || {}),
  },
});

const writeStudentProgress = (progress) => {
  writeStorage(STORAGE_KEYS.studentProgress, progress);
  persistServerState(STORAGE_KEYS.studentProgress, progress);
};

const getStudentFeedback = () => {
  const task = readStorage(STORAGE_KEYS.studentTask, null) || readStorage(STORAGE_KEYS.assignedTask, null);
  const fallback = [
    { from: 'me', text: `Сәлеметсіз бе! ${task?.code || 'PH-09-022'} есебінде қиналып жатырмын.` },
    { from: 'teacher', text: 'Қай қадамда қиналғаныңды жаз, бірге қараймыз.' },
  ];
  return readStorage(STORAGE_KEYS.studentFeedback, fallback) || fallback;
};

const updateTeacherChatFromStudent = (message) => {
  const chats = readStorage(STORAGE_KEYS.teacherChats, {}) || {};
  const target = 'Айдана Мұқашева';
  const next = {
    ...chats,
    [target]: [...(chats[target] || []), { from: 'student', text: message }],
  };
  writeStorage(STORAGE_KEYS.teacherChats, next);
  persistServerState(STORAGE_KEYS.teacherChats, next);
};

const getStudentNotifications = () => {
  const task = readStorage(STORAGE_KEYS.studentTask, null) || readStorage(STORAGE_KEYS.assignedTask, null);
  const progress = readStudentProgress();
  const feedback = getStudentFeedback();
  const unreadTeacher = feedback.filter(msg => msg.from === 'teacher').length;
  const notices = [];
  if (task) notices.push(`Белсенді есеп: ${task.code}`);
  notices.push(`XP: ${progress.xp}`);
  notices.push(`Мұғалімнен хабарлама: ${unreadTeacher}`);
  if (progress.streak) notices.push(`Streak: ${progress.streak} күн`);
  return notices;
};

const evaluateStudentSolution = ({ task, solution }) => {
  const text = String(solution || '').toLowerCase();
  const nums = (String(solution || '').match(/\d+(?:[.,]\d+)?/g) || []).map(n => Number(n.replace(',', '.')));
  if (task?.subject === 'Физика' && isMotionForceProblem(task.problem || '')) {
    const hasAcceleration = nums.some(n => Math.abs(n - 4) < 0.05);
    const hasForce = nums.some(n => Math.abs(n - 4800) < 1);
    const hasUnit = text.includes('н');
    const criterionResults = [
      { title: 'Берілген шамаларды анықтайды', ok: true, feedback: 'Берілгендер шартта көрсетілген.' },
      { title: 'Үдеуді есептейді', ok: hasAcceleration, feedback: hasAcceleration ? 'Үдеу дұрыс табылған.' : 'Үдеу 4 м/с² болуы керек.' },
      { title: 'Күшті табады', ok: hasForce, feedback: hasForce ? 'Күш мәні дұрыс есептелген.' : 'Күш 4800 Н болуы керек.' },
      { title: 'Жауапты рәсімдейді', ok: hasForce && hasUnit, feedback: hasUnit ? 'Жауапта бірлік көрсетілген.' : 'Жауапқа Н бірлігін қосуды ұмытпа.' },
    ];
    return {
      score: criterionResults.filter(x => x.ok).length,
      maxScore: criterionResults.length,
      feedback: criterionResults.filter(x => x.ok).length >= 3 ? 'Жауап жақсы. Соңғы рәсімдеуді тексер.' : 'Үдеу мен күшті табу қадамдарын қайта қара.',
      criterionResults,
    };
  }
  const criterionResults = (task?.criteria || []).map(item => ({
    title: item.title,
    ok: text.length > 8,
    feedback: text.length > 8 ? 'Жауап жіберілді, негізгі қадамдар бар.' : 'Жауапты толығырақ жазу керек.',
  }));
  return {
    score: criterionResults.filter(x => x.ok).length,
    maxScore: criterionResults.length,
    feedback: 'Жауап сақталды. Мұғалім мен Akyl қосымша тексере алады.',
    criterionResults,
  };
};

/* ─────────────── STAT COUNTER ─────────────── */
const StatCounter = ({ value, suffix = '', label }) => {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting) return;
      obs.disconnect();
      const duration = 1400;
      const steps = 50;
      const increment = value / steps;
      let cur = 0;
      const tick = () => {
        cur = Math.min(cur + increment, value);
        setCount(Math.round(cur));
        if (cur < value) requestAnimationFrame(tick);
      };
      setTimeout(() => requestAnimationFrame(tick), 100);
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [value]);
  return (
    <div ref={ref} style={{ textAlign: 'center', padding: '0 32px' }}>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 'clamp(38px, 5vw, 58px)', fontWeight: 400, letterSpacing: '-0.035em', lineHeight: 1, color: 'var(--ink)' }}>
        {count.toLocaleString()}{suffix}
      </div>
      <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 8, fontFamily: 'var(--font-mono)', textTransform: 'uppercase', letterSpacing: '.06em' }}>{label}</div>
    </div>
  );
};

const useInView = (threshold = 0.12) => {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
};

const Reveal = ({ children, delay = 0, style: extraStyle = {} }) => {
  const [ref, visible] = useInView();
  return (
    <div ref={ref} style={{ opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(28px)', transition: `opacity .65s ease ${delay}ms, transform .65s ease ${delay}ms`, ...extraStyle }}>

    </div>
  );
};

    const saved = readStorage(STORAGE_KEYS.criteriaDraft);
    if (!saved) return;
    if (saved.problem) setProblem(saved.problem);
    if (saved.subject) setSubject(saved.subject);
    if (saved.grade) setGrade(String(saved.grade));
    if (saved.difficulty) setDifficulty(saved.difficulty);
    if (saved.evalType) setEvalType(saved.evalType);
    if (saved.descCount) setDescCount(String(saved.descCount));
    if (saved.lang2) setLang2(saved.lang2);
    if (saved.bloomLevel) setBloomLevel(saved.bloomLevel);
    if (Array.isArray(saved.criteria) && saved.criteria.length) {
      setCriteria(saved.criteria);
      setGenerated(true);
      setVisibleCount(saved.criteria.length);
      setGenTime(saved.genTime || '');
    }
  }, []);

  useEffect(() => {
    writeStorage(STORAGE_KEYS.criteriaDraft, {
      problem, subject, grade, difficulty, evalType, descCount, lang2, bloomLevel, criteria, genTime
    });
  }, [problem, subject, grade, difficulty, evalType, descCount, lang2, bloomLevel, criteria, genTime]);

  const revealCriteria = (list) => {
    let i = 0;
    const tick = () => { i++; setVisibleCount(i); if (i < list.length) setTimeout(tick, 160); };
    tick();
  };

  const handleGenerate = async () => {
    if (!problem.trim()) return;
    setGenerating(true);
    setGenerated(false);
    setVisibleCount(0);
    setGenError('');
    const t0 = Date.now();

    if (aiEnabled) {
      try {
        const langLabel = lang2;
        const res = await fetch('/api/criteria', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem, subject, grade, difficulty, evalType, descCount, langLabel, bloomLevel })
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || 'AI request failed');
        let parsed = Array.isArray(data.criteria) ? data.criteria : [];
        const genericMarkers = ['applying formulas', 'using data', 'doing calculations', 'interpr', 'understanding the problem'];
        if (isMotionForceProblem(problem) && subject === 'Физика') {
          parsed = buildMotionCriteria();
        } else if (!parsed.length || parsed.some(item => genericMarkers.some(marker => String(item.title).toLowerCase().includes(marker)))) {
          parsed = buildSubjectCriteria({ subject, problem, descCount: Number(descCount), bloomLevel });
        }
        setCriteria(parsed);
        setGenerating(false);
        setGenerated(true);
        setGenTime(((Date.now() - t0) / 1000).toFixed(1));
        revealCriteria(parsed);
      } catch (err) {
        setGenerating(false);
        setGenError(err.message.slice(0, 140));
      }
    } else {
      const parsed = isMotionForceProblem(problem) && subject === 'Физика'
        ? buildMotionCriteria()
        : buildSubjectCriteria({ subject, problem, descCount: Number(descCount), bloomLevel });
      setCriteria(parsed);
      setGenerating(false);
      setGenerated(true);
      setGenTime(((Date.now() - t0) / 1000).toFixed(1));
      revealCriteria(parsed);
    }
  };

  const currentTask = buildAssignedTask({
    problem,
    subject,
    grade,
    difficulty,
    evalType,
    bloomLevel,
    criteria: criteria.length
      ? criteria
      : isMotionForceProblem(problem) && subject === 'Физика'
        ? buildMotionCriteria()
        : buildSubjectCriteria({ subject, problem, descCount: Number(descCount), bloomLevel })
  });
  const handleShareCriteria = async () => {
    const ok = await copyText(formatCriteriaText({ problem, criteria: currentTask.criteria, meta: { subject, grade, bloomLevel, evalType } }));
    if (!ok) {
      downloadTextFile('smartcriteria-criteria.txt', formatCriteriaText({ problem, criteria: currentTask.criteria, meta: { subject, grade, bloomLevel, evalType } }));
    }
  };
  const handleExportPrintable = () => {
    const html = `
      <html><head><meta charset="utf-8"><title>${currentTask.code}</title></head>
      <body style="font-family:Arial,sans-serif;padding:32px;line-height:1.5">
      <h1>${subject} · ${grade}-сынып</h1>
      <p><strong>Есеп:</strong> ${problem}</p>
      <table border="1" cellspacing="0" cellpadding="8" style="border-collapse:collapse;width:100%">
      <tr><th>#</th><th>Критерий</th><th>Дескриптор</th><th>Балл</th></tr>
      ${currentTask.criteria.map((item, index) => `<tr><td>${index + 1}</td><td>${item.title}</td><td>${item.desc}</td><td>${item.pts}</td></tr>`).join('')}
      </table></body></html>`;
    downloadHtmlFile(`${currentTask.code}.html`, html);
  };
  const handleUseGenerated = (target) => {
    writeStorage(STORAGE_KEYS.criteriaDraft, { problem, subject, grade, difficulty, evalType, descCount, lang2, bloomLevel, criteria: currentTask.criteria, genTime });
    writeStorage(STORAGE_KEYS.assignedTask, currentTask);
    persistServerState(STORAGE_KEYS.assignedTask, currentTask);
    writeStorage(STORAGE_KEYS.studentTask, currentTask);
    persistServerState(STORAGE_KEYS.studentTask, currentTask);
    onNav(target);
  };

  return (
    <>
      <TopBar title={t.criteriaGen} subtitle="Генератор · AI">
        <button className="btn" onClick={() => setProblem(DEFAULT_PROBLEM)}><Icon name="upload" size={14} /> Файл жүктеу</button>
        <button className="btn btn-accent" onClick={handleGenerate} disabled={generating} style={{ opacity: generating ? .7 : 1 }}>
          {generating ? <><span style={{ display:'inline-block', width:12, height:12, border:'2px solid #0f1115', borderTopColor:'transparent', borderRadius:'50%', animation:'spin .7s linear infinite' }} /> Жасалуда...</> : <><Icon name="sparkle" size={14} /> {t.generate}</>}
        </button>
      </TopBar>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div className="teacher-content" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div className="sc-card" style={{ padding: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
              <span style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '.08em' }}>01 · Есептің шарты</span>
              <div style={{ display:'flex', gap:6 }}>
                <select value={subject} onChange={e=>setSubject(e.target.value)} style={{ fontSize:11, background:'var(--surface-2)', border:'1px solid var(--line)', borderRadius:6, padding:'3px 8px', color:'var(--ink-2)', fontFamily:'var(--font-sans)', cursor:'pointer' }}>
                  {['Физика','Алгебра','Геометрия','Химия','Биология'].map(s=><option key={s}>{s}</option>)}
                </select>
                <select value={grade} onChange={e=>setGrade(e.target.value)} style={{ fontSize:11, background:'var(--surface-2)', border:'1px solid var(--line)', borderRadius:6, padding:'3px 8px', color:'var(--ink-2)', fontFamily:'var(--font-sans)', cursor:'pointer' }}>
                  {['7','8','9','10','11'].map(g=><option key={g}>{g}-сынып</option>)}
                </select>
              </div>
            </div>
            <textarea
              value={problem}
              onChange={e => setProblem(e.target.value)}
              placeholder="Есеп мәтінін осында жазыңыз немесе файл жүктеңіз..."
              style={{ width:'100%', minHeight:160, border:'1px solid var(--line)', borderRadius:6, padding:14, background:'var(--surface-2)', color:'var(--ink)', fontSize:13.5, lineHeight:1.6, fontFamily:'var(--font-sans)', resize:'vertical', outline:'none', boxSizing:'border-box' }}
              onFocus={e=>e.target.style.borderColor='var(--accent)'}
              onBlur={e=>e.target.style.borderColor='var(--line)'}
            />
            <div style={{ marginTop:10, display:'flex', gap:6 }}>
              {[subject, `${grade}-сынып`].map(tg=><span key={tg} className="chip" style={{ background:'var(--surface)' }}>{tg}</span>)}
            </div>
          </div>
          <div className="sc-card" style={{ padding: 20 }}>
            <div style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 12 }}>Параметрлер</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <div>
                <div style={{ fontSize:10, fontFamily:'var(--font-mono)', color:'var(--ink-3)', textTransform:'uppercase', marginBottom:4 }}>Күрделілік</div>
                <select value={difficulty} onChange={e=>setDifficulty(e.target.value)} style={{ width:'100%', padding:'8px 12px', border:'1px solid var(--line)', borderRadius:6, background:'var(--surface-2)', color:'var(--ink)', fontSize:13, fontFamily:'var(--font-sans)', cursor:'pointer' }}>
                  {['Жеңіл','Орта','Қиын'].map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
              <div>
                <div style={{ fontSize:10, fontFamily:'var(--font-mono)', color:'var(--ink-3)', textTransform:'uppercase', marginBottom:4 }}>Дескриптор саны</div>
                <select value={descCount} onChange={e=>setDescCount(e.target.value)} style={{ width:'100%', padding:'8px 12px', border:'1px solid var(--line)', borderRadius:6, background:'var(--surface-2)', color:'var(--ink)', fontSize:13, fontFamily:'var(--font-sans)', cursor:'pointer' }}>
                  {['3','4','5','6'].map(n=><option key={n}>{n}</option>)}
                </select>
              </div>
              <div style={{ gridColumn:'span 2' }}>
                <div style={{ fontSize:10, fontFamily:'var(--font-mono)', color:'var(--ink-3)', textTransform:'uppercase', marginBottom:4 }}>Бағалау түрі</div>
                <select value={evalType} onChange={e=>setEvalType(e.target.value)} style={{ width:'100%', padding:'8px 12px', border:'1px solid var(--line)', borderRadius:6, background:'var(--surface-2)', color:'var(--ink)', fontSize:13, fontFamily:'var(--font-sans)', cursor:'pointer' }}>
                  {['Қалыптастырушы','Жиынтық','Диагностикалық'].map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
              <div style={{ gridColumn:'span 2' }}>
                <div style={{ fontSize:10, fontFamily:'var(--font-mono)', color:'var(--ink-3)', textTransform:'uppercase', marginBottom:4 }}>Блум таксономиясы</div>
                <select value={bloomLevel} onChange={e=>setBloomLevel(e.target.value)} style={{ width:'100%', padding:'8px 12px', border:'1px solid var(--line)', borderRadius:6, background:'var(--surface-2)', color:'var(--ink)', fontSize:13, fontFamily:'var(--font-sans)', cursor:'pointer' }}>
                  {['Білу және түсіну','Қолдану','Талдау','Жинақтау','Бағалау'].map(level=><option key={level}>{level}</option>)}
                </select>
              </div>
              <div style={{ gridColumn:'span 2' }}>
                <div style={{ fontSize:10, fontFamily:'var(--font-mono)', color:'var(--ink-3)', textTransform:'uppercase', marginBottom:4 }}>Тіл</div>
                <select value={lang2} onChange={e=>setLang2(e.target.value)} style={{ width:'100%', padding:'8px 12px', border:'1px solid var(--line)', borderRadius:6, background:'var(--surface-2)', color:'var(--ink)', fontSize:13, fontFamily:'var(--font-sans)', cursor:'pointer' }}>
                  {['Қазақша','Орысша','Ағылшынша'].map(l=><option key={l}>{l}</option>)}
                </select>
              </div>
            </div>
          </div>
          {generated && (
            <div className="sc-card" style={{ padding: 14, display: 'flex', alignItems: 'center', gap: 12, background: 'var(--surface-2)' }}>
              <Icon name="lightning" size={16} />
              <div style={{ fontSize: 12.5, color: 'var(--ink-2)', flex: 1 }}>Akyl {criteria.length} критерий шығарды. <strong style={{ color: 'var(--ink)' }}>{genTime} секунд.</strong></div>
              <span style={{ fontSize: 10, color: 'var(--ink-3)', fontFamily: 'var(--font-mono)' }}>{new Date().getHours()}:{String(new Date().getMinutes()).padStart(2,'0')}</span>
            </div>
          )}
        </div>

        <div className="sc-card" style={{ padding: 20, display: 'flex', flexDirection: 'column' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
            <span style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '.08em' }}>02 · {t.criteria} & {t.descriptors}</span>
            {generated && <div style={{ display: 'flex', gap: 6 }}>
              <button className="btn" style={{ padding: '4px 10px', fontSize: 11 }} onClick={() => setGenerated(false)}><Icon name="edit" size={12} /> Өңдеу</button>
              <button className="btn" style={{ padding: '4px 10px', fontSize: 11 }} onClick={handleShareCriteria}><Icon name="send" size={12} /> {t.share}</button>
              <button className="btn" style={{ padding: '4px 10px', fontSize: 11 }} onClick={handleExportPrintable}><Icon name="upload" size={12} /> PDF-ready</button>
            </div>}
          </div>

          {generating && (
            <div style={{ flex:1, display:'flex', flexDirection:'column', gap:12, justifyContent:'center', alignItems:'center', color:'var(--ink-3)' }}>
              <div style={{ width:40, height:40, border:'3px solid var(--line-2)', borderTopColor:'var(--accent)', borderRadius:'50%', animation:'spin .8s linear infinite' }} />
              <div style={{ fontSize:13 }}>{aiEnabled ? 'GPT-4o-mini талдап жатыр...' : 'Akyl оқып жатыр...'}</div>
              <div style={{ fontSize:11, fontFamily:'var(--font-mono)' }}>{subject} · {grade}-сынып · {descCount} критерий · Блум: {bloomLevel}</div>
            </div>
          )}

          {genError && !generating && (
            <div style={{ flex:1, display:'flex', flexDirection:'column', gap:12, justifyContent:'center', alignItems:'center', color:'var(--danger)', textAlign:'center', padding:20 }}>
              <Icon name="x" size={28} />
              <div style={{ fontSize:13 }}>{genError}</div>
              <button className="btn" onClick={() => setGenError('')} style={{ fontSize:12 }}>Жабу</button>
            </div>
          )}

          {!generating && !generated && !genError && (
            <div style={{ flex:1, display:'flex', flexDirection:'column', gap:12, justifyContent:'center', alignItems:'center', color:'var(--ink-3)', textAlign:'center' }}>
              <Icon name="sparkle" size={32} />
              <div style={{ fontSize:14 }}>Есепті жазып, «{t.generate}» батырмасын басыңыз</div>
              {aiEnabled && <div style={{ fontSize:11, fontFamily:'var(--font-mono)', color:'var(--success)' }}>● GPT-4o-mini қосылған</div>}
            </div>
          )}

          {generated && !generating && (
            <>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, marginBottom: 16, lineHeight: 1.35, color:'var(--ink-2)' }}>
                {problem.slice(0, 60)}{problem.length > 60 ? '...' : ''}
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12, flex:1 }}>
                {criteria.slice(0, visibleCount).map((c, i) => (
                  <div key={i} style={{ display: 'flex', gap: 12, padding: '12px 0', borderTop: i > 0 ? '1px dashed var(--line)' : 'none', animation:'pfade .3s ease both' }}>
                    <span style={{ width: 22, height: 22, borderRadius: 99, border: '1px solid var(--line-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--ink-2)', flexShrink: 0 }}>{i+1}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13.5, fontWeight: 500, marginBottom: 3 }}>{c.title}</div>
                      <div style={{ fontSize: 12, color: 'var(--ink-3)', lineHeight: 1.5 }}>{c.desc}</div>
                    </div>
                    <span style={{ fontSize: 11, color: 'var(--ink-2)', fontFamily: 'var(--font-mono)', flexShrink: 0 }}>{c.pts}б</span>
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 'auto', paddingTop: 16, borderTop: '1px solid var(--line)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 11, color: 'var(--ink-3)', fontFamily: 'var(--font-mono)' }}>Барлығы · {criteria.reduce((a,c)=>a+c.pts,0)} балл</span>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button className="btn" onClick={() => handleUseGenerated('catalog')}><Icon name="book" size={13} /> Каталогқа</button>
                  <button className="btn btn-solid" onClick={() => handleUseGenerated('class')}><Icon name="send" size={13} /> Сыныпқа</button>
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    </>
  );
};

const UploadScreen = ({ t, onNav }) => {
  const [tab, setTab] = useState('photo');
  const [textInput, setTextInput] = useState('');
  const [recording, setRecording] = useState(false);
  const [recSecs, setRecSecs] = useState(0);
  const [photoReady, setPhotoReady] = useState(true);
  const [recognizedPhotoText, setRecognizedPhotoText] = useState('');
  const [uploadedImage, setUploadedImage] = useState(null);
  const [voiceText, setVoiceText] = useState('');
  const [extracting, setExtracting] = useState(false);
  const [starting, setStarting] = useState(false);
  const fileInputRef = useRef(null);
  const speechRef = useRef(null);

  useEffect(() => {
    let id;
    if (recording) {
      id = setInterval(() => setRecSecs(s => s + 1), 1000);
    } else {
      setRecSecs(0);
    }
    return () => clearInterval(id);
  }, [recording]);

  const tabs = [['edit', t.type, 'text'], ['camera', t.photo, 'photo'], ['mic', t.voice, 'voice']];

  const canProceed = tab === 'photo' ? photoReady : tab === 'text' ? textInput.trim().length > 10 : recSecs > 2;
  const assignedTask = readStorage(STORAGE_KEYS.studentTask, null) || readStorage(STORAGE_KEYS.assignedTask, null);
  const recognizedText = recognizedPhotoText || assignedTask?.problem || 'Машина 5с-та 0→20м/с. m=1200кг. Күшті табу.';

  useEffect(() => {
    if (tab === 'text' && assignedTask?.problem && !textInput) {
      setTextInput(assignedTask.problem);
    }
  }, [assignedTask, tab, textInput]);

  useEffect(() => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return;
    const recognition = new SpeechRecognition();
    recognition.lang = 'kk-KZ';
    recognition.interimResults = true;
    recognition.continuous = true;
    recognition.onresult = (event) => {
      const transcript = Array.from(event.results).map(r => r[0].transcript).join(' ');
      setVoiceText(transcript.trim());
    };
    recognition.onend = () => {
      if (recording) setRecording(false);
    };
    speechRef.current = recognition;
  }, [recording]);

  const resizeImage = (dataUrl, maxPx) => new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });

  const handlePhotoPick = async (event) => {
    const file = event.target.files?.[0];
    if (!file) return;
    setExtracting(true);
    const reader = new FileReader();
    reader.onload = async () => {
      setUploadedImage(reader.result);
      try {
        const resized = await resizeImage(reader.result, 1024);
        const res = await fetch('/api/extract-task', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageDataUrl: resized }),
        });
        const data = await res.json();
        if (data.text) setRecognizedPhotoText(data.text);
      } catch (err) { console.error('OCR error:', err); }
      setExtracting(false);
    };
    reader.readAsDataURL(file);
  };

  const toggleVoice = () => {
    const recognition = speechRef.current;
    if (!recognition) {
      setVoiceText('Бұл браузерде speech-to-text қолдауы жоқ.');
      return;
    }
    if (recording) {
      recognition.stop();
      setRecording(false);
    } else {
      setVoiceText('');
      recognition.start();
      setRecording(true);
    }
  };

  const handleStartTask = async () => {
    if (!canProceed || starting) return;
    setStarting(true);
    const problem = tab === 'text'
      ? textInput.trim()
      : tab === 'voice'
        ? (voiceText || 'Оқушы дауыспен тапсырманы жазды.')
        : recognizedText;

    let newCriteria = assignedTask?.criteria || buildDemoCriteria(4);
    
    if (tab === 'photo' ? recognizedPhotoText : problem !== assignedTask?.problem) {
      try {
        const res = await fetch('/api/criteria', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem, descCount: 4, subject: assignedTask?.subject || 'Алгебра' })
        });
        const data = await res.json();
        if (data.criteria) {
          newCriteria = data.criteria;
        }
      } catch (err) {
        console.error(err);
      }
    }

    const nextTask = buildAssignedTask({
      ...(assignedTask || {}),
      problem,
      title: problem.slice(0, 52),
      criteria: newCriteria,
    });
    writeStorage(STORAGE_KEYS.studentTask, nextTask);
    persistServerState(STORAGE_KEYS.studentTask, nextTask);
    setStarting(false);
    onNav('criteria');
  };

  return (
  <PhoneWrap active="tasks" onNav={onNav}>
    <div style={{ padding: '12px 20px 100px', height: 'calc(100% - 44px)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div style={{ cursor: 'pointer' }} onClick={() => onNav('home')}><Icon name="arrow-left" size={20} /></div>
        <span style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '.08em' }}>Жаңа есеп · 02</span>
        <div style={{ cursor: 'pointer' }} onClick={() => onNav('home')}><Icon name="x" size={20} /></div>
      </div>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 26, marginBottom: 6, letterSpacing: '-0.02em' }}>{t.startTask}</div>
      <div style={{ fontSize: 13, color: 'var(--ink-3)', marginBottom: 20 }}>Қалай жүктегің келеді?</div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 14 }}>
        {tabs.map(([ic, lb, id]) => (
          <div key={id} onClick={() => setTab(id)} className="sc-card" style={{ padding: '12px 8px', textAlign: 'center', background: tab === id ? 'var(--ink)' : 'var(--surface)', color: tab === id ? 'var(--bg)' : 'var(--ink-2)', borderColor: tab === id ? 'var(--ink)' : 'var(--line)', cursor: 'pointer', transition: 'all .18s' }}>
            <Icon name={ic} size={16} /><div style={{ fontSize: 11, marginTop: 6 }}>{lb}</div>
          </div>
        ))}
      </div>

      {tab === 'photo' && (
        <>
          <div className="sc-card" style={{ padding: 12, marginBottom: 12, flex: 1, display: 'flex', flexDirection: 'column' }}>
            <div style={{ flex: 1, borderRadius: 6, background: '#1a1a1a', position: 'relative', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 10, minHeight: 120 }}>
              {uploadedImage ? (
                <img src={uploadedImage} alt="Task" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
              ) : (
                <div style={{ position: 'absolute', inset: 10, background: 'repeating-linear-gradient(transparent 0 22px,rgba(255,255,255,.07) 22px 23px),#f5f1e6', borderRadius: 4, padding: 14, transform: 'rotate(-2deg)', fontFamily: 'var(--font-display)', fontStyle: 'italic', color: '#3a3020', fontSize: 13, lineHeight: '23px' }}>
                  <div>Машина 5 секундта 0-ден</div><div>20 м/с-ке дейін үдейді.</div><div>m = 1200 кг. F = ? Н</div>
                </div>
              )}
              <div style={{ position: 'absolute', top: 8, right: 8 }}>
                <span style={{ padding: '3px 8px', borderRadius: 99, background: 'rgba(212,255,59,.85)', color: '#0f1115', fontSize: 10, fontFamily: 'var(--font-mono)', fontWeight: 600 }}>{extracting ? '...' : '96% ✓'}</span>
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: 'var(--ink-2)', marginBottom: 6 }}>
              <Icon name="sparkle" size={13} /> {extracting ? 'Akyl суретті оқып жатыр...' : 'Akyl мәтінді танып алды'}<span style={{ marginLeft: 'auto', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--success)' }}>{extracting ? 'өңдеу' : 'дайын'}</span>
            </div>
            <div className="sc-bar"><i style={{ width: '96%', background: 'var(--success)' }} /></div>
          </div>
          <div className="sc-card" style={{ padding: 12, background: 'var(--surface-2)', marginBottom: 12 }}>
            <div style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--ink-3)', textTransform: 'uppercase', marginBottom: 6 }}>Танылды</div>
            <div style={{ fontSize: 13, lineHeight: 1.5 }}>{recognizedText}</div>

const CriteriaScreen2 = ({ t, onNav }) => {
  const [secs, setSecs] = useState(12 * 60);
  const task = readStorage(STORAGE_KEYS.studentTask, null) || readStorage(STORAGE_KEYS.assignedTask, null) || buildAssignedTask({ criteria: buildDemoCriteria(4) });
  const [solution, setSolution] = useState(() => readStorage(`${STORAGE_KEYS.studentTask}.solution`, 'a = 20/5 = 4 м/с²\nF = 1200 · 4 = 4800 Н'));
  const [evaluation, setEvaluation] = useState(() => readStorage(`${STORAGE_KEYS.studentTask}.evaluation`, null));
  useEffect(() => {
    const id = setInterval(() => setSecs(s => s > 0 ? s - 1 : 0), 1000);
    return () => clearInterval(id);
  }, []);
  useEffect(() => {
    writeStorage(`${STORAGE_KEYS.studentTask}.solution`, solution);
  }, [solution]);
  const mm = String(Math.floor(secs / 60)).padStart(2, '0');
  const ss = String(secs % 60).padStart(2, '0');
  const urgent = secs < 120;
  const completedCount = Math.min(task.criteria.length, Math.max(1, solution.trim().split('\n').filter(Boolean).length));
  const submitAnswer = () => {
    const result = evaluateStudentSolution({ task, solution });
    setEvaluation(result);
    writeStorage(`${STORAGE_KEYS.studentTask}.evaluation`, result);
    const progress = readStudentProgress();
    const alreadySolved = progress.solvedCodes.includes(task.code);
    const gainedXp = Math.max(20, (result.score || 0) * 15);
    const nextBranches = {
      ...progress.branches,
      [task.subject]: {
        total: progress.branches[task.subject]?.total || 10,
        done: Math.min((progress.branches[task.subject]?.total || 10), (progress.branches[task.subject]?.done || 0) + (alreadySolved ? 0 : 1)),
      },
    };
    const nextProgress = {
      ...progress,
      xp: progress.xp + (alreadySolved ? 0 : gainedXp),
      solvedTasks: progress.solvedTasks + (alreadySolved ? 0 : 1),
      streak: progress.streak + (alreadySolved ? 0 : 1),
      branches: nextBranches,
      solvedCodes: alreadySolved ? progress.solvedCodes : [...progress.solvedCodes, task.code],
    };
    writeStudentProgress(nextProgress);
    const summary = `${task.code} тапсырмасы жіберілді. Балл: ${result.score || 0}/${result.maxScore || task.criteria.length}`;
    const nextFeedback = [
      ...getStudentFeedback(),
      { from: 'me', text: summary },
      { from: 'teacher', text: result.feedback || 'Жауап қабылданды.' },
    ];
    writeStorage(STORAGE_KEYS.studentFeedback, nextFeedback);
    persistServerState(STORAGE_KEYS.studentFeedback, nextFeedback);
    updateTeacherChatFromStudent(summary);
    onNav('home');
  };
  return (
  <PhoneWrap active="tasks" onNav={onNav}>
    <div style={{ padding: '12px 20px 100px', height: 'calc(100% - 44px)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

        <div style={{ cursor: 'pointer' }} onClick={() => onNav('tasks')}><Icon name="arrow-left" size={20} /></div>
        <span style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: urgent ? 'var(--danger)' : 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '.06em', transition: 'color .3s' }}>{task.subject} · {task.grade} · {mm}:{ss} қалды</span>
        <div style={{ cursor:'pointer' }} onClick={() => window.alert(getStudentNotifications().join('\n'))}><Icon name="bell" size={18} /></div>
      </div>
      <div className="sc-card" style={{ padding: 14, marginBottom: 14, background: 'var(--surface-2)' }}>
        <div style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--ink-3)', textTransform: 'uppercase', marginBottom: 5 }}>Есеп · {task.code}</div>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 15, lineHeight: 1.35 }}>{task.problem}</div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
        <span style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--ink-3)', textTransform: 'uppercase' }}>{t.requirements} · {completedCount}/{task.criteria.length}</span>
        <span style={{ fontSize: 11, color: 'var(--ink-2)', display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="star" size={12} /> +6 XP</span>
      </div>
      <div className="sc-card" style={{ marginBottom: 12 }}>
        {task.criteria.map((criterion, i) => {
          const st = i < completedCount - 1 ? 'done' : i === completedCount - 1 ? 'active' : 'pending';
          return (

                {st === 'active' && <div style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--accent)', marginTop: 2 }}>← қазір осында</div>}

        <div style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--ink-3)', textTransform: 'uppercase', marginBottom: 6 }}>{t.yourSolution}</div>
        <textarea

          onChange={e => setSolution(e.target.value)}
          style={{ width:'100%', minHeight:110, resize:'none', border:'1px solid var(--line)', borderRadius:8, background:'var(--surface)', color:'var(--ink)', fontSize:13, lineHeight:1.7, fontFamily:'var(--font-mono)', padding:12, outline:'none', boxSizing:'border-box' }}
          onFocus={e => e.target.style.borderColor = 'var(--accent)'}

          </div>

      <div style={{ display: 'flex', gap: 8, marginTop: 'auto' }}>
        <button onClick={() => onNav('tutor')} style={{ flex: 1, padding: '12px', border: '1px solid var(--line)', borderRadius: 10, background: 'transparent', color: 'var(--ink)', cursor: 'pointer', fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7 }}>
          <Icon name="sparkle" size={14} /> {t.explain}
        </button>
        <button onClick={submitAnswer} style={{ flex: 1.4, padding: '12px', border: 'none', borderRadius: 10, background: 'var(--accent)', color: '#0f1115', cursor: 'pointer', fontSize: 13, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7 }}>

const TutorScreen = ({ t, onNav, aiEnabled, aiModel }) => {
  const currentTask = readStorage(STORAGE_KEYS.studentTask, null) || readStorage(STORAGE_KEYS.assignedTask, null);
  const greetingText = currentTask
    ? `Сәлем! Мен Akyl. Қазір сен ${currentTask.subject} пәнінен ${currentTask.code} тапсырмасымен жұмыс істеп жатырсың. Қай жері қиын болып тұр?`
    : 'Сәлем! Мен Akyl — сенің AI тьюторың. Қандай сұрағың бар?';
  const greeting = { from:'akyl', id:0, content: greetingText };
  const [msgs, setMsgs] = useState([greeting]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const listRef = useRef(null);

  useEffect(() => {
    if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight;
  }, [msgs, typing]);

  const sendMsg = async () => {
    const text = input.trim();
    if (!text || typing) return;
    const id = Date.now();
    const nextMsgs = [...msgs, { from:'me', id, content: text }];
    setMsgs(nextMsgs);
    setInput('');
    setTyping(true);

    if (aiEnabled) {
      try {
        const history = nextMsgs.map(m => ({
          role: m.from === 'me' ? 'user' : 'assistant',
          content: typeof m.content === 'string' ? m.content : '[Akyl reply]'
        }));
        const res = await fetch('/api/tutor', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history })
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || 'AI request failed');
        const reply = data.reply.trim();
        setMsgs(m => [...m, { from:'akyl', id: id+1, content: reply }]);
      } catch (err) {
        setMsgs(m => [...m, { from:'akyl', id: id+1, content: `Error: ${err.message.slice(0,60)}` }]);
      }
      setTyping(false);
    } else {
      setMsgs(m => [...m, { from:'akyl', id: id+1, content: 'Set OPENAI_API_KEY in .env' }]);
      setTyping(false);
    }
  };

  const quickReplies = [t.similarTask, 'Тағы мысал', 'Неге F=ma?', t.askTeacher];

  return (
  <PhoneWrap active="tutor" onNav={onNav}>
    <div style={{ padding: '12px 0 100px', height: 'calc(100% - 44px)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ padding: '0 20px', display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
        <div style={{ cursor: 'pointer' }} onClick={() => onNav('criteria')}><Icon name="arrow-left" size={20} /></div>
        <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--accent)', color: '#0f1115', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="sparkle" size={16} /></div>
        <div>
          <div style={{ fontSize: 14, fontWeight: 500 }}>Akyl</div>
          <div style={{ fontSize: 11, color: typing ? 'var(--accent)' : 'var(--ink-3)', transition: 'color .2s' }}>
            {typing ? 'жазып жатыр...' : aiEnabled ? '● GPT-4o-mini · қосылған' : 'AI-тьютор · демо режим'}
          </div>
        </div>
      </div>
      <div ref={listRef} style={{ flex: 1, overflow: 'auto', padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {msgs.map((b, i) => (
          <div key={b.id} style={{ animation: i < 4 ? `pfade .35s ease both` : 'pfade .2s ease both', animationDelay: i < 4 ? `${i * 120}ms` : '0ms' }}>
            <Bubble from={b.from}>{b.content}</Bubble>
          </div>
        ))}
        {typing && (
          <div style={{ animation: 'pfade .2s ease both' }}>
            <Bubble from="akyl">
              <span style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                {[0,1,2].map(i => <span key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--ink-3)', animation: `bounce .8s ease infinite`, animationDelay: `${i * .15}s` }} />)}
              </span>
            </Bubble>
          </div>
        )}
        <div style={{ display: 'flex', gap: 7, flexWrap: 'wrap', marginTop: 4 }}>
          {quickReplies.map(s => (
            <span key={s} onClick={() => {
              if (s === t.askTeacher) {
                const text = `${currentTask?.code || 'Есеп'} бойынша мұғалімге сұрақ жіберілді.`;
                writeStorage(STORAGE_KEYS.studentFeedback, [...getStudentFeedback(), { from: 'me', text }, { from: 'teacher', text: 'Сұрағыңды көрдім, жақын арада жауап беремін.' }]);
                updateTeacherChatFromStudent(text);
                onNav('home');
              } else {
                setInput(s);
              }
            }} className="chip" style={{ padding: '6px 12px', fontSize: 11.5, cursor: 'pointer' }}><Icon name="sparkle" size={11} /> {s}</span>
          ))}
        </div>
      </div>
      <style>{`@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}`}</style>
      <div style={{ padding: '12px 16px 0', borderTop: '1px solid var(--line)', display: 'flex', gap: 8, alignItems: 'center' }}>
        <Icon name="plus" size={18} />
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && sendMsg()}
          placeholder="Akyl-ға жаз..."
          style={{ flex: 1, padding: '10px 14px', border: '1px solid var(--line-2)', borderRadius: 999, background: 'var(--surface)', color: 'var(--ink)', fontSize: 13, fontFamily: 'var(--font-sans)', outline: 'none' }}
          onFocus={e => e.target.style.borderColor = 'var(--accent)'}
          onBlur={e => e.target.style.borderColor = 'var(--line-2)'}
        />
        <div
          onClick={sendMsg}
          style={{ width: 36, height: 36, borderRadius: '50%', background: input.trim() && !typing ? 'var(--ink)' : 'var(--surface-2)', color: input.trim() && !typing ? 'var(--bg)' : 'var(--ink-3)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: input.trim() && !typing ? 'pointer' : 'default', transition: 'all .15s' }}
        ><Icon name="send" size={14} /></div>
      </div>
    </div>
  </PhoneWrap>
  );
};

          <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--surface-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 14 }}>Е</div>
          <div><div style={{ fontSize: 14, fontWeight: 500 }}>Ерлан Қ.</div><div style={{ fontSize: 11, color: 'var(--success)', display: 'flex', alignItems: 'center', gap: 4 }}><span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--success)' }} />Желіде</div></div>
        </div>
        <div style={{ flex: 1, overflow: 'auto', padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
          {messages.map((msg, index) => <Bubble key={index} from={msg.from === 'teacher' ? 'akyl' : 'me'}>{msg.text}</Bubble>)}
        </div>
        <div style={{ padding: '12px 16px 0', borderTop: '1px solid var(--line)', display: 'flex', gap: 8, alignItems: 'center' }}>
          <Icon name="camera" size={18} />
          <input value={draft} onChange={e => setDraft(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendFeedback()} style={{ flex: 1, padding: '10px 14px', border: '1px solid var(--line-2)', borderRadius: 999, background: 'var(--surface)', color: 'var(--ink)', fontSize: 13, outline: 'none' }} placeholder="Хабарлама..." />
          <div onClick={sendFeedback} style={{ cursor:'pointer' }}><Icon name="send" size={18} /></div>
        </div>
      </div>
    </PhoneWrap>
  );
};

const StudentApp = ({ t, sub, onNav, aiEnabled, aiModel }) => {
  const screens = {
    tasks: <UploadScreen t={t} onNav={onNav} />,
    criteria: <CriteriaScreen2 t={t} onNav={onNav} />,
    tutor: <TutorScreen t={t} onNav={onNav} aiEnabled={aiEnabled} aiModel={aiModel} />,
    tree: <TreeScreen t={t} onNav={onNav} />,
    home: <FeedbackScreen t={t} onNav={onNav} />,
  };
  return screens[sub] || screens.tasks;
};

   AUTH
═══════════════════════════════════════ */
const ACCOUNTS = [
  { login: 'teacher@smart.kz', password: 'Mugalim2024', role: 'teacher', name: 'Ерлан Қасымов' },
  { login: 'student@smart.kz', password: 'Okushy2024',  role: 'student', name: 'Айдана Мұқашева' },
];

const LoginPage = ({ onLogin }) => {
  const [login,    setLogin]    = useState('');
  const [password, setPassword] = useState('');
  const [showPw,   setShowPw]   = useState(false);
  const [error,    setError]    = useState('');
  const [loading,  setLoading]  = useState(false);
  const [shake,    setShake]    = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    setTimeout(() => {
      const acc = ACCOUNTS.find(a => a.login === login.trim().toLowerCase() && a.password === password);
      if (acc) {
        onLogin(acc);
      } else {
        setLoading(false);
        setError('Логин немесе пароль қате');
        setShake(true);
        setTimeout(() => setShake(false), 500);
      }
    }, 800);
  };

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <style>{`
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
        @keyframes spin2{to{transform:rotate(360deg)}}
      `}</style>

      <div style={{ width: '100%', maxWidth: 400 }}>
        {/* Logo */}
        <div style={{ textAlign: 'center', marginBottom: 48 }}>
          <div style={{ width: 52, height: 52, borderRadius: 14, background: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
            <Icon name="sparkle" size={26} />
          </div>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, letterSpacing: '-0.03em' }}>SmartCriteria</div>
          <div style={{ fontSize: 13, color: 'var(--ink-3)', marginTop: 6 }}>Жүйеге кіру</div>
        </div>

        {/* Card */}
        <div
          className="sc-card"
          style={{ padding: 32, animation: shake ? 'shake .4s ease' : 'none' }}
        >
          <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>

            {/* Login field */}
            <div>
              <label style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '.08em', display: 'block', marginBottom: 8 }}>
                Логин (email)
              </label>
              <div style={{ position: 'relative' }}>
                <div style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--ink-3)', pointerEvents: 'none' }}>
                  <Icon name="user" size={15} />
                </div>
                <input
                  type="text"
                  value={login}
                  onChange={e => { setLogin(e.target.value); setError(''); }}
                  placeholder="email@smart.kz"
                  autoComplete="username"
                  style={{ width: '100%', padding: '11px 12px 11px 38px', border: `1px solid ${error ? 'var(--danger)' : 'var(--line)'}`, borderRadius: 8, background: 'var(--surface-2)', color: 'var(--ink)', fontSize: 14, fontFamily: 'var(--font-sans)', outline: 'none', boxSizing: 'border-box', transition: 'border-color .15s' }}
                  onFocus={e => { if (!error) e.target.style.borderColor = 'var(--accent)'; }}
                  onBlur={e => { if (!error) e.target.style.borderColor = 'var(--line)'; }}
                />
              </div>
            </div>

            {/* Password field */}
            <div>
              <label style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '.08em', display: 'block', marginBottom: 8 }}>
                Пароль
              </label>
              <div style={{ position: 'relative' }}>
                <div style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--ink-3)', pointerEvents: 'none' }}>
                  <Icon name="lock" size={15} />
                </div>
                <input
                  type={showPw ? 'text' : 'password'}
                  value={password}
                  onChange={e => { setPassword(e.target.value); setError(''); }}
                  placeholder="••••••••"
                  autoComplete="current-password"
                  style={{ width: '100%', padding: '11px 40px 11px 38px', border: `1px solid ${error ? 'var(--danger)' : 'var(--line)'}`, borderRadius: 8, background: 'var(--surface-2)', color: 'var(--ink)', fontSize: 14, fontFamily: 'var(--font-sans)', outline: 'none', boxSizing: 'border-box', transition: 'border-color .15s' }}
                  onFocus={e => { if (!error) e.target.style.borderColor = 'var(--accent)'; }}
                  onBlur={e => { if (!error) e.target.style.borderColor = 'var(--line)'; }}
                />
                <div
                  onClick={() => setShowPw(v => !v)}
                  style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--ink-3)', cursor: 'pointer', padding: 4 }}
                >
                  <Icon name={showPw ? 'eye-off' : 'eye'} size={15} />
                </div>
              </div>
            </div>

            {/* Error */}
            {error && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 14px', borderRadius: 8, background: 'color-mix(in oklch, var(--danger) 10%, transparent)', border: '1px solid color-mix(in oklch, var(--danger) 25%, transparent)', fontSize: 13, color: 'var(--danger)', animation: 'pfade .2s ease' }}>
                <Icon name="x" size={13} /> {error}
              </div>
            )}

            {/* Submit */}
            <button
              type="submit"
              disabled={loading || !login || !password}
              style={{ marginTop: 4, padding: '13px', border: 'none', borderRadius: 10, background: login && password ? 'var(--accent)' : 'var(--surface-2)', color: login && password ? '#0f1115' : 'var(--ink-3)', fontSize: 14, fontWeight: 600, cursor: login && password ? 'pointer' : 'default', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, transition: 'all .2s' }}
            >
              {loading
                ? <><span style={{ width: 16, height: 16, border: '2px solid #0f1115', borderTopColor: 'transparent', borderRadius: '50%', animation: 'spin2 .7s linear infinite', display: 'inline-block' }} /> Тексеріліп жатыр...</>
                : <><Icon name="arrow-right" size={15} /> Кіру</>
              }
            </button>
          </form>
        </div>

        <div style={{ textAlign: 'center', marginTop: 24, fontSize: 12, color: 'var(--ink-3)' }}>
          SmartCriteria · 2026 · Қазақстан
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════
   APP (ROUTER)
═══════════════════════════════════════ */
function App() {
  const [lang,    setLang]    = useState('kz');
  const [page,    setPage]    = useState('landing');
  const [sub,     setSub]     = useState(null);
  const [account, setAccount] = useState(() => readStorage(STORAGE_KEYS.account, null));
  const [aiEnabled, setAiEnabled] = useState(false);
  const [aiModel, setAiModel] = useState('gpt-4o-mini');
  const t = dict[lang] || dict.kz;

  useEffect(() => {
    syncStateFromServer();
    fetch('/config')
      .then(r => r.json())
      .then(cfg => {
        setAiEnabled(Boolean(cfg.aiEnabled));
        if (cfg.model) setAiModel(cfg.model);
      })
      .catch(() => {});
  }, []);

  useEffect(() => {
    document.body.style.overflow = page === 'teacher' ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [page]);

  useEffect(() => {
    if (!account) return;
    if (account.role === 'teacher') {
      setPage('teacher');
      setSub(prev => prev || 'criteria');
    } else if (account.role === 'student') {
      setPage('student');
      setSub(prev => prev || 'tasks');
    }
  }, [account]);

  const nav = useCallback((nextPage, nextSub = null) => {
    setPage(nextPage);
    setSub(nextSub);
    if (nextPage !== 'teacher') window.scrollTo(0, 0);
  }, []);

  const handleLogin = (acc) => {
    writeStorage(STORAGE_KEYS.account, acc);
    setAccount(acc);
    if (acc.role === 'teacher') nav('teacher', 'criteria');
    else nav('student', 'tasks');
  };

  const handleLogout = () => {
    try {
      window.localStorage.removeItem(STORAGE_KEYS.account);
    } catch {}
    setAccount(null);
    nav('landing');
  };

  const handleTeacherNav = (id) => {
    if (id === 'landing') nav('landing');
    else nav('teacher', id);
  };

  if (page === 'login') return (
    <div className="page-fade">
      <LoginPage onLogin={handleLogin} />
    </div>
  );

  if (page === 'landing') return (
    <div className="page-fade">
      <LandingPage t={t} onNavigate={() => nav('login')} lang={lang} onLangChange={setLang} />
    </div>
  );

  if (page === 'teacher') return (
    <div className="page-fade">
      <TeacherApp t={t} sub={sub || 'criteria'} onNav={handleTeacherNav} account={account} onLogout={handleLogout} aiEnabled={aiEnabled} aiModel={aiModel} onOpenStudent={() => nav('student', 'criteria')} />
    </div>
  );

  if (page === 'student') return (
    <div className="page-fade" style={{ minHeight: '100vh', background: 'var(--bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px' }}>
      <button
        onClick={handleLogout}
        style={{ position: 'fixed', top: 20, left: 20, zIndex: 300, display: 'flex', alignItems: 'center', gap: 8, padding: '8px 16px', border: '1px solid var(--line-2)', borderRadius: 8, background: 'var(--surface)', color: 'var(--ink-2)', fontSize: 13, cursor: 'pointer' }}
        onMouseEnter={e => e.currentTarget.style.color = 'var(--ink)'}
        onMouseLeave={e => e.currentTarget.style.color = 'var(--ink-2)'}
      >
        ← Шығу
      </button>
      <div className="phone-frame">
        <StudentApp t={t} sub={sub || 'tasks'} onNav={(id) => nav('student', id)} aiEnabled={aiEnabled} aiModel={aiModel} />
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
